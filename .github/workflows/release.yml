name: Release
on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: read

jobs:
  build-release:
    runs-on: ubuntu-latest
    if: github.repository == 'tinylibs/tinybench'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - name: Install dependencies
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Type check
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Run unit tests
        run: pnpm test
        env:
          FORCE_COLOR: 2

      - name: Run examples
        run: cd examples && pnpm all
  publish-npm:
    runs-on: ubuntu-latest
    needs: build-release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts --frozen-lockfile

      - name: Read package.json version
        id: package-version
        uses: jaywcjlove/github-action-package@80422aa6ff92d94694afcec1f9ddda84f41ed160 # v2.1.0

      - name: Publish release
        run: pnpm stage publish --no-git-checks
        if: ${{ contains(steps.package-version.outputs.version, '-') == false }}

      - name: Publish release candidate
        if: ${{ contains(steps.package-version.outputs.version, '-rc') == true }}
        run: pnpm stage publish --no-git-checks --tag next

      - name: Publish beta release
        if: ${{ contains(steps.package-version.outputs.version, '-beta') == true }}
        run: pnpm stage publish --no-git-checks --tag beta

      - name: Publish alpha release
        if: ${{ contains(steps.package-version.outputs.version, '-alpha') == true }}
        run: pnpm stage publish --no-git-checks --tag alpha
  changelog:
    runs-on: ubuntu-latest
    needs: publish-npm
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - run: npx changelogithub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-documentation:
    runs-on: ubuntu-latest
    needs: changelog

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Generate documentation
        run: |
          pnpm install --ignore-scripts --frozen-lockfile
          pnpm typedoc

      - name: Commit and push changes
        if: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
        env:
          COMMIT_MESSAGE: 'docs: publish documentation'
          COMMIT_AUTHOR: Documentation Bot
          COMMIT_EMAIL: documentation-bot@users.noreply.github.com
        run: |
          git config --local user.name "${{ env.COMMIT_AUTHOR }}"
          git config --local user.email "${{ env.COMMIT_EMAIL }}"
          git pull
          git add ./docs
          git commit -a -m "${{ env.COMMIT_MESSAGE }}"
          git push
